# Week 5 · Declarative Automation Bundle for the medallion pipeline.
# Deploys the Week 4 declarative pipeline + the orchestrating Lakeflow Job across dev / staging / prod targets.
# Copy to a repo root, run `databricks bundle validate -t dev` then `databricks bundle deploy -t dev`.

bundle:
  name: dea_learning_orders
  databricks_cli_version: ">=0.230.0"

variables:
  catalog:
    description: "Target Unity Catalog"
    default: dea_learning_dev
  landing_volume_path:
    description: "Volume root for raw landing"
    default: "/Volumes/dea_learning_dev/raw/landing"
  notification_email:
    description: "Failure email"
    default: team@example.com
  cluster_node_type:
    default: i3.xlarge

sync:
  include:
    - "src/**"
  exclude:
    - "**/__pycache__/**"
    - "tests/**"

resources:
  pipelines:
    medallion_orders:
      name: "medallion_orders_${bundle.target}"
      catalog: ${var.catalog}
      target: bronze    # default target schema; tables use their own where set
      libraries:
        - notebook:
            path: ./src/pipeline_bronze_silver_gold.sql
        - notebook:
            path: ./src/pipeline_auto_cdc_scd2.sql
      configuration:
        landing_path: ${var.landing_volume_path}

  jobs:
    orders_etl:
      name: "orders_etl_${bundle.target}"
      email_notifications:
        on_failure: ["${var.notification_email}"]
      tasks:
        - task_key: ingest_setup
          notebook_task:
            notebook_path: ./src/setup_catalog_and_seed.py
          job_cluster_key: main
        - task_key: medallion
          depends_on:
            - task_key: ingest_setup
          pipeline_task:
            pipeline_id: ${resources.pipelines.medallion_orders.id}
      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: ${var.cluster_node_type}
            num_workers: 2

targets:
  dev:
    default: true
    mode: development          # prefixes [dev <user>], pauses schedules
    workspace:
      host: https://dev.cloud.databricks.com
    variables:
      catalog: dea_learning_dev
      landing_volume_path: "/Volumes/dea_learning_dev/raw/landing"

  staging:
    workspace:
      host: https://staging.cloud.databricks.com
    variables:
      catalog: dea_learning_staging
      landing_volume_path: "/Volumes/dea_learning_staging/raw/landing"
      cluster_node_type: i3.2xlarge

  prod:
    mode: production           # locks naming + run_as, schedules active
    workspace:
      host: https://prod.cloud.databricks.com
    run_as:
      service_principal_name: "prod-deployer-sp"
    variables:
      catalog: dea_learning
      landing_volume_path: "/Volumes/dea_learning/raw/landing"
      cluster_node_type: i3.4xlarge
      notification_email: oncall@example.com
    permissions:
      - level: CAN_VIEW
        group_name: data_consumers
      - level: CAN_MANAGE
        group_name: data_platform_admins